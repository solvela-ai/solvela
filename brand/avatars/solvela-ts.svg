<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#08081A" rx="48"/>

  <!-- Hex frame — TypeScript blue -->
  <polygon points="200,45 334,122 334,278 200,355 66,278 66,122"
    fill="none" stroke="#3178C6" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>

  <!-- Vertex nodes -->
  <circle cx="200" cy="45"  r="4.5" fill="#3178C6" opacity="0.8"/>
  <circle cx="334" cy="122" r="4.5" fill="#3178C6" opacity="0.8"/>
  <circle cx="334" cy="278" r="4.5" fill="#3178C6" opacity="0.8"/>
  <circle cx="200" cy="355" r="4.5" fill="#3178C6" opacity="0.8"/>
  <circle cx="66"  cy="278" r="4.5" fill="#3178C6" opacity="0.8"/>
  <circle cx="66"  cy="122" r="4.5" fill="#3178C6" opacity="0.8"/>

  <!-- S mark -->
  <path d="M 238,138 C 238,110 162,110 162,158 C 162,198 238,202 238,242 C 238,280 162,280 162,258"
    fill="none" stroke="url(#sg)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Badge -->
  <rect x="272" y="302" width="56" height="26" rx="6" fill="#3178C6"/>
  <text x="300" y="320" font-family="'SF Mono', 'Fira Code', monospace" font-size="13"
    font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">ts</text>
</svg>
