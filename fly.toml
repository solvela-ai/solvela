app = "solvela-gateway"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8402"
  RUST_LOG = "gateway=info,tower_http=info"

[http_service]
  internal_port = 8402
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
