name: ai-sdk-provider

on:
  push:
    paths:
      - 'sdks/ai-sdk-provider/**'
      - 'sdks/signer-core/**'
      - '.github/workflows/ai-sdk-provider.yml'
  pull_request:
    paths:
      - 'sdks/ai-sdk-provider/**'
      - 'sdks/signer-core/**'
      - '.github/workflows/ai-sdk-provider.yml'

defaults:
  run:
    working-directory: sdks/ai-sdk-provider

jobs:
  docs-key-leak-check:
    name: Docs key-leak check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - name: "Build signer-core dist/ (file: dep — npm doesn't auto-build)"
        working-directory: sdks/signer-core
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run check:docs

  install:
    name: Install (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: docs-key-leak-check
    strategy:
      matrix:
        # Node 18 dropped: vitest 4.x and other dev tooling import
        # `node:util.styleText`, which was added in Node 20.12. Runtime
        # code (sign.ts) only needs Node 14+; engines.node in package.json
        # remains permissive for consumers.
        node: ['20']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - name: "Build signer-core dist/ (file: dep — npm doesn't auto-build)"
        working-directory: sdks/signer-core
        run: npm ci && npm run build
      - run: npm ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - name: "Build signer-core dist/ (file: dep — npm doesn't auto-build)"
        working-directory: sdks/signer-core
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - name: "Build signer-core dist/ (file: dep — npm doesn't auto-build)"
        working-directory: sdks/signer-core
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run lint

  test-unit:
    name: Unit tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        # Node 18 dropped: vitest 4.x and other dev tooling import
        # `node:util.styleText`, which was added in Node 20.12. Runtime
        # code (sign.ts) only needs Node 14+; engines.node in package.json
        # remains permissive for consumers.
        node: ['20']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - name: "Build signer-core dist/ (file: dep — npm doesn't auto-build)"
        working-directory: sdks/signer-core
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run test:unit

  test-integration:
    name: Integration tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        # Node 18 dropped: vitest 4.x and other dev tooling import
        # `node:util.styleText`, which was added in Node 20.12. Runtime
        # code (sign.ts) only needs Node 14+; engines.node in package.json
        # remains permissive for consumers.
        node: ['20']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - name: "Build signer-core dist/ (file: dep — npm doesn't auto-build)"
        working-directory: sdks/signer-core
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run test:integration

  size:
    name: Bundle size check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - name: "Build signer-core dist/ (file: dep — npm doesn't auto-build)"
        working-directory: sdks/signer-core
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run build
      - run: npm run size

  guard-install-scripts:
    name: Guard install scripts
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - name: "Build signer-core dist/ (file: dep — npm doesn't auto-build)"
        working-directory: sdks/signer-core
        run: npm ci && npm run build
      - run: npm ci
      - name: Fail if any dependency has postinstall/preinstall/prepublish
        run: |
          SCRIPTS=$(npm ls --all --json 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          def check(node, path=''):
              scripts = node.get('scripts', {})
              bad = [s for s in ['postinstall','preinstall','prepublish'] if s in scripts]
              if bad:
                  print(f'{path}: {bad}')
              for name, child in node.get('dependencies', {}).items():
                  check(child, name)
          check(data)
          ")
          if [ -n "$SCRIPTS" ]; then
            echo "ERROR: unexpected install scripts found:"
            echo "$SCRIPTS"
            exit 1
          fi
          echo "OK: no unexpected install scripts"

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - name: "Build signer-core dist/ (file: dep — npm doesn't auto-build)"
        working-directory: sdks/signer-core
        run: npm ci && npm run build
      - run: npm ci
      # Audit-level critical (not high) because @solana/spl-token transitively
      # pulls bigint-buffer, which has a known high-severity CVE
      # (GHSA-3gc7-fjrx-p6mg) with no upstream fix. Affects the entire Solana
      # ecosystem. Dependabot security alerts cover the high-severity gap on
      # the repo level; this job catches CRITICAL regressions in CI.
      # Mirrors openclaw-provider.yml; signer-core's bs58/web3.js/spl-token
      # hard-deps reach this audit via signer-core's node_modules after
      # `npm ci` here builds it as a file: dep above.
      - run: npm audit --production --audit-level=critical
