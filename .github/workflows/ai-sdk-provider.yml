name: ai-sdk-provider

on:
  push:
    paths:
      - 'sdks/ai-sdk-provider/**'
      - 'sdks/signer-core/**'
      - '.github/workflows/ai-sdk-provider.yml'
  pull_request:
    paths:
      - 'sdks/ai-sdk-provider/**'
      - 'sdks/signer-core/**'
      - '.github/workflows/ai-sdk-provider.yml'

defaults:
  run:
    working-directory: sdks/ai-sdk-provider

jobs:
  docs-key-leak-check:
    name: Docs key-leak check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - run: npm ci
      - run: npm run check:docs

  install:
    name: Install (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: docs-key-leak-check
    strategy:
      matrix:
        node: ['18', '20']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - run: npm ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - run: npm ci
      - run: npm run lint

  test-unit:
    name: Unit tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  test-integration:
    name: Integration tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - run: npm ci
      - run: npm run test:integration

  size:
    name: Bundle size check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run size

  guard-install-scripts:
    name: Guard install scripts
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - run: npm ci
      - name: Fail if any dependency has postinstall/preinstall/prepublish
        run: |
          SCRIPTS=$(npm ls --all --json 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          def check(node, path=''):
              scripts = node.get('scripts', {})
              bad = [s for s in ['postinstall','preinstall','prepublish'] if s in scripts]
              if bad:
                  print(f'{path}: {bad}')
              for name, child in node.get('dependencies', {}).items():
                  check(child, name)
          check(data)
          ")
          if [ -n "$SCRIPTS" ]; then
            echo "ERROR: unexpected install scripts found:"
            echo "$SCRIPTS"
            exit 1
          fi
          echo "OK: no unexpected install scripts"

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/ai-sdk-provider/package-lock.json
      - run: npm ci
      - run: npm audit --production --audit-level=high
