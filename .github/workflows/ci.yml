name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c676846f29d98ff6b0106d3608c7ffd4048af17b  # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all

  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    # Runs independently — no `needs:` — parallel with the rust job

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Get current date (for advisory-db cache key)
        id: date
        run: echo "date=$(date -u '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-audit
          # Key includes the tool version so the cache is invalidated on upgrades.
          # Bump the version suffix here when you want a fresh install.
          key: ${{ runner.os }}-cargo-audit-0.21

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Cache advisory-db
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cargo/advisory-db
          # Daily key so the DB is refreshed at most once per day per runner OS.
          # `restore-keys` lets a slightly stale cache be used and cargo-audit
          # will do an incremental git-fetch on top of it.
          key: ${{ runner.os }}-advisory-db-${{ steps.date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-advisory-db-

      - name: Run cargo audit
        # RUSTSEC-2023-0071 (Marvin timing sidechannel in `rsa` 0.9.x): no
        # fixed upstream version exists. The `rsa` crate is transitive via
        # `sqlx-mysql` only, and Solvela uses Postgres (`sqlx-postgres`) —
        # the vulnerable code path is never reached. Re-evaluate when `rsa`
        # ships a fix or `sqlx` drops the unused mysql/rsa transitive.
        run: cargo audit --ignore RUSTSEC-2023-0071

  smoke-test:
    name: Smoke test (boot gateway + curl endpoints)
    runs-on: ubuntu-latest
    needs: rust

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: solvela
          POSTGRES_PASSWORD: solvela
          POSTGRES_DB: solvela_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solvela"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c676846f29d98ff6b0106d3608c7ffd4048af17b  # v2

      - name: Build gateway (release)
        run: cargo build --release -p gateway

      - name: Start gateway
        run: |
          DATABASE_URL="postgres://solvela:solvela@localhost:5432/solvela_test" \
          REDIS_URL="redis://localhost:6379" \
          SOLVELA_DEV_BYPASS_PAYMENT=true \
          SOLVELA_ADMIN_TOKEN=ci-test-token \
          RUST_LOG=gateway=info \
          ./target/release/solvela-gateway &
          echo "GATEWAY_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for gateway to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8402/health > /dev/null 2>&1; then
              echo "Gateway healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Gateway failed to start within 30s"
          exit 1

      - name: Run smoke tests
        run: |
          set -euo pipefail
          BASE="http://localhost:8402"
          PASS=0
          FAIL=0

          check() {
            local name="$1"
            shift
            if "$@"; then
              echo "PASS: $name"
              PASS=$((PASS + 1))
            else
              echo "FAIL: $name"
              FAIL=$((FAIL + 1))
            fi
          }

          # 1. GET /health → 200
          check "GET /health returns 200" \
            curl -sf "$BASE/health" -o /dev/null -w '' --fail

          # 2. GET /v1/models → 200, body contains "data"
          check "GET /v1/models returns 200 with data" \
            bash -c 'curl -sf "$0/v1/models" | grep -q "\"data\""' "$BASE"

          # 3. POST /v1/chat/completions → 402 or 500 (no payment header, bypass
          #    enabled but no provider API keys means FallbackProvider responds)
          check "POST /v1/chat/completions returns expected status" \
            bash -c '
              status=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "$0/v1/chat/completions" \
                -H "Content-Type: application/json" \
                -d "{\"model\":\"openai-gpt-4o\",\"messages\":[{\"role\":\"user\",\"content\":\"hello\"}]}")
              echo "  status=$status"
              [ "$status" = "402" ] || [ "$status" = "500" ] || [ "$status" = "200" ]
            ' "$BASE"

          # 4. GET /metrics with admin token → 200, body contains "solvela_requests_total"
          check "GET /metrics with admin token returns metrics" \
            bash -c '
              body=$(curl -sf "$0/metrics" -H "Authorization: Bearer ci-test-token")
              echo "$body" | grep -q "solvela_requests_total"
            ' "$BASE"

          # 5. POST /v1/chat/completions with X-Solvela-Debug: true → x-solvela-request-id header present
          check "X-Solvela-Debug returns x-solvela-request-id header" \
            bash -c '
              headers=$(curl -sD - -o /dev/null \
                -X POST "$0/v1/chat/completions" \
                -H "Content-Type: application/json" \
                -H "X-Solvela-Debug: true" \
                -d "{\"model\":\"openai-gpt-4o\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}]}")
              echo "$headers" | grep -qi "x-solvela-request-id"
            ' "$BASE"

          # 6. POST with X-Request-Id → echoed back
          check "X-Request-Id is echoed back" \
            bash -c '
              headers=$(curl -sD - -o /dev/null \
                -X POST "$0/v1/chat/completions" \
                -H "Content-Type: application/json" \
                -H "X-Request-Id: ci-test-123" \
                -d "{\"model\":\"openai-gpt-4o\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}]}")
              echo "$headers" | grep -q "ci-test-123"
            ' "$BASE"

          # 7. Send 5 rapid requests → rate limit headers present
          check "Rate limit headers present after rapid requests" \
            bash -c '
              for i in 1 2 3 4 5; do
                curl -s -o /dev/null \
                  -X POST "$0/v1/chat/completions" \
                  -H "Content-Type: application/json" \
                  -d "{\"model\":\"openai-gpt-4o\",\"messages\":[{\"role\":\"user\",\"content\":\"test $i\"}]}"
              done
              headers=$(curl -sD - -o /dev/null \
                -X POST "$0/v1/chat/completions" \
                -H "Content-Type: application/json" \
                -d "{\"model\":\"openai-gpt-4o\",\"messages\":[{\"role\":\"user\",\"content\":\"test 6\"}]}")
              echo "$headers" | grep -qi "x-ratelimit-limit"
            ' "$BASE"

          echo ""
          echo "Results: $PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ]

      - name: Stop gateway
        if: always()
        run: |
          if [ -n "${GATEWAY_PID:-}" ]; then
            kill "$GATEWAY_PID" 2>/dev/null || true
            wait "$GATEWAY_PID" 2>/dev/null || true
          fi

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: rust

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          push: false
          tags: solvela:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
