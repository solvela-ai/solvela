name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c676846f29d98ff6b0106d3608c7ffd4048af17b  # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all

  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    # Runs independently — no `needs:` — parallel with the rust job

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Get current date (for advisory-db cache key)
        id: date
        run: echo "date=$(date -u '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cargo/bin/cargo-audit
          # Key includes the tool version so the cache is invalidated on upgrades.
          # Bump the version suffix here when you want a fresh install.
          key: ${{ runner.os }}-cargo-audit-0.21

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Cache advisory-db
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cargo/advisory-db
          # Daily key so the DB is refreshed at most once per day per runner OS.
          # `restore-keys` lets a slightly stale cache be used and cargo-audit
          # will do an incremental git-fetch on top of it.
          key: ${{ runner.os }}-advisory-db-${{ steps.date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-advisory-db-

      - name: Run cargo audit
        run: cargo audit

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: rust

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          push: false
          tags: rustyclawrouter:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
